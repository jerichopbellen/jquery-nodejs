<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Register</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <script src="https://code.jquery.com/jquery-3.6.4.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script src="js/user.js"></script>
  </head>
  <body>
    <div id="home"></div>

    <form id="registerForm" style="max-width: 400px; margin: 30px auto">
      <h2>Register</h2>

      <div style="margin-bottom: 15px">
        <label for="name">Name:</label><br />
        <input type="text" id="name" name="name" required style="width: 100%; padding: 8px" />
      </div>

      <div style="margin-bottom: 15px">
        <label for="email">Email:</label><br />
        <input type="email" id="email" name="email" required style="width: 100%; padding: 8px" />
      </div>

      <div style="margin-bottom: 15px">
        <label for="password">Password:</label><br />
        <input type="password" id="password" name="password" required style="width: 100%; padding: 8px" />
      </div>

      <button
        type="submit"
        id="register"
        style="
          width: 100%;
          padding: 10px;
          background: #007bff;
          color: #fff;
          border: none;
          border-radius: 4px;
        "
      >
        Register
      </button>
    </form>
  </body>
</html>
