<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Profile</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/style.css" />

    <script src="https://code.jquery.com/jquery-3.6.4.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js" crossorigin="anonymous"></script>
    <script src="js/user.js"></script>
  </head>
  <body id="profile">
    <div id="home"></div>
    <div class="container">
      <h1>User Profile</h1>
      <form id="profileForm" enctype="multipart/form-data">
        <div class="form-group">
          <label for="avatar">Avatar:</label>
          <input type="file" id="avatar" name="image" accept="image/*" />
          <img id="avatarPreview" src="#" alt="Avatar Preview" style="display:none; max-width:120px;" />
        </div>

        <div class="form-group">
          <label for="firstName">First Name:</label>
          <input type="text" id="firstName" name="fname" />
        </div>
        <div class="form-group">
          <label for="lastName">Last Name:</label>
          <input type="text" id="lastName" name="lname" />
        </div>
        <div class="form-group">
          <label for="address">Address:</label>
          <input type="text" id="address" name="addressline" />
        </div>
        <div class="form-group">
          <label for="town">Town:</label>
          <input type="text" id="town" name="town" required />
        </div>
        <div class="form-group">
          <label for="phone">Phone:</label>
          <input type="text" id="phone" name="phone" required />
        </div>
        <div class="form-group">
          <label for="zipcode">Postcode:</label>
          <input type="text" id="zipcode" name="zipcode" />
        </div>
        <button type="submit" id="updateBtn">Submit</button>
      </form>
    </div>
  </body>
</html>
