<body>
  <div id="header"></div>
  <div id="items" class="container">

<div class="table-responsive">
  <table id="itable" class="table table-striped table-bordered" style="width:100%">
    <thead>
      <tr>
        <th>ID</th>
        <th>Thumbnail</th>
        <th>Description</th>
        <th>Brand</th>
        <th>Category</th>
        <th>Cost Price</th>
        <th>Sell Price</th>
        <th>Available Stock</th>
        <th>Specifications</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      </tbody>
  </table>
</div>

  <div class="modal fade" id="itemModal" role="dialog" style="display: none">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h4 class="modal-title">Create new item</h4>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
        <form id="iform">
          <div class="form-group">
            <label for="desc" class="control-label">Description</label>
            <input type="text" class="form-control" id="desc" name="description" />
          </div>

          <div class="form-group">
            <label for="brand" class="control-label">Brand</label>
            <select class="form-control" id="brand" name="brand_id">
              <option value="">Select Brand</option>
              </select>
          </div>

          <div class="form-group">
            <label for="category" class="control-label">Category</label>
            <select class="form-control" id="category" name="category_id">
              <option value="">Select Category</option>
              </select>
          </div>

          <div class="form-group">
            <label for="sell" class="control-label">Sell Price</label>
            <input type="text" class="form-control" id="sell" name="sell_price" />
          </div>
          <div class="form-group">
            <label for="cost" class="control-label">Cost Price</label>
            <input type="text" class="form-control" id="cost" name="cost_price" />
          </div>
          <div class="form-group">
            <label for="qty" class="control-label">Quantity</label>
            <input type="text" class="form-control" id="qty" name="quantity" />
          </div>
          <div class="form-group">
            <label for="specs" class="control-label">Specifications (JSON format)</label>
            <textarea class="form-control" id="specs" name="specs" placeholder='{\"ram\": \"8GB\", \"storage\": \"128GB\"}'></textarea>
          </div>
          <div class="form-group">
            <label for="img" class="control-label">Image</label>
            <input type="file" class="form-control" id="img" name="image" /> 
          </div>
        </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
          <button id="itemSubmit" type="submit" class="btn btn-primary">Save</button>
          <button id="itemUpdate" type="submit" class="btn btn-primary">Update</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
