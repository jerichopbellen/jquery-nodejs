<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Profile</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/style.css" />

  <script src="https://code.jquery.com/jquery-3.6.4.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <!-- common -->
<script src="js/header.js"></script>

  <!-- page -->
  <script src="js/profile.js"></script>
</head>
<body id="profile">
  <div id="header"></div>

  <div class="container">
    <h1>User Profile</h1>
    <form id="profileForm" enctype="multipart/form-data">
      <div class="form-group">
        <label for="avatar">Avatar:</label>
        <input type="file" id="avatar" name="image" accept="image/*" class="form-control" />
        <img id="avatarPreview" src="#" alt="Avatar Preview" style="display:none;max-width:120px;" />
      </div>
      <div class="form-group"><label>First Name:</label><input type="text" id="firstName" name="fname" class="form-control" /></div>
      <div class="form-group"><label>Last Name:</label><input type="text" id="lastName" name="lname" class="form-control" /></div>
      <div class="form-group"><label>Address:</label><input type="text" id="address" name="addressline" class="form-control" /></div>
      <div class="form-group"><label>Phone:</label><input type="text" id="phone" name="phone" class="form-control" /></div>
      <div class="form-group"><label>Postcode:</label><input type="text" id="zipcode" name="zipcode" class="form-control" /></div>
      <button type="submit" id="updateBtn" class="btn btn-primary">Submit</button>
    </form>
  </div>
</body>
</html>
